<!DOCTYPE html>
<html>
    <head>

    </head>

    <body>
        <h1>Admin Login</h1>
        <!-- if error detected in url query variable "?error", then will display the error variable passed as error msg in red -->
        {% if error %} <p style="color:red">{{ error }} </p> {% endif %}
        <form method="post" action="/admin/login">
            <input type="password" name="passphrase" placeholder="Admin Password" >
            <button type="submit">Login</button>
        </form>

        <p><a href="/">Back to Guest</a></p>
    </body>

</html>

<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1> Admin </h1>
        <small>{{ rules_badge }}</small>
        <p> Editor and rules freezing coming later </p>
        <p> <a href = "/"> Back to Guest usage. </a></p>
        <form method="post" action="/admin/logout">
            <button type = "submit"> Logout </button>
        </form>
        {% if rules_errors and rules_errors|length %}
        <div style="color:red; margin:.5rem 0">
            <strong>Rules check failed:</strong>
            <ul>
            {% for e in rules_errors %}<li>{{ e }}</li>{% endfor %}
            </ul>
        </div>
        {% endif %}

    </body>
</html>
